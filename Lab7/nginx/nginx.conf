worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 80;

        # Gateway health endpoint (for your quick checks/screenshots)
        location /_gateway_health {
            return 200 'gateway_ok';
            add_header Content-Type text/plain;
        }

        # Route /api (public) -> Flask service's /api (internal)
        location /api {
            proxy_pass         http://flask:5000/api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout   5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # Optional: forward root traffic to Flask root
        location / {
            proxy_pass http://flask:5000/;
        }
    }
}